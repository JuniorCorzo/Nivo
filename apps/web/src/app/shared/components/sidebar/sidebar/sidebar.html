<aside class="flex flex-col gap-6 border-r border-border min-w-60 min-h-full py-6 px-4">
  <div>
    <ng-icon name="nivo-logo-horizontal" class="w-28! h-fit!"></ng-icon>
  </div>
  <nav class="flex flex-1 flex-col gap-2">
    @for (item of navItems(); track $index) {
      <span
        class="inline-flex items-center font-mono text-base gap-2 px-3 h-9 rounded-md hover:bg-muted cursor-pointer hover:scale-x-105 transition-transform"
        [class.bg-muted]="item.isActive"
      >
        <ng-icon [name]="item.icon" size="20" />
        <span>{{ item.label }}</span>
      </span>
    }
  </nav>
  <app-sidebar-footer />
</aside>
