        input, textarea {

          border: 1px solid #ddd;

          box-sizing: border-box;

        textarea {

        }
        button {

          border: none;

          border-radius: 4px;

          font-size: 14px;

          margin-right: 10px;
          transition: background 0.2s;
        }
        button:hover {
          background: #0056b3;
        }
        button:disabled {
          background: #ccc;
          cursor: not-allowed;
        }
        button.danger {
          background: #dc3545;
        }
        button.danger:hover {
          background: #c82333;
        }
        button.success {
          background: #28a745;
        }
        button.success:hover {
          background: #218838;
        }
        .status {
          padding: 12px;
          border-radius: 4px;
          margin: 20px 0;
          font-weight: 600;
          font-size: 14px;
        }
        .status.disconnected {
          background: #f8d7da;
          color: #721c24;
          border: 1px solid #f5c6cb;
        }
        .status.connected {
          background: #d4edda;
          color: #155724;
          border: 1px solid #c3e6cb;
        }
        .status.error {
          background: #fff3cd;
          color: #856404;
          border: 1px solid #ffeaa7;
        }
        .log-container {
          margin-top: 30px;
        }
        #log {
          background: #1e1e1e;
          color: #d4d4d4;
          padding: 15px;
          border-radius: 4px;
          font-family: 'Courier New', monospace;
          font-size: 12px;
          max-height: 400px;
          overflow-y: auto;
          line-height: 1.6;
        }
        .log-entry {
          margin: 5px 0;
          padding: 4px 0;
        }
        .log-entry.info { color: #4ec9b0; }
        .log-entry.success { color: #4fc3f7; }
        .log-entry.warning { color: #ffb74d; }
        .log-entry.error { color: #f44336; }
        .timestamp {
          color: #808080;
          font-size: 11px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🔌 WebSocket Test Client</h1>
    <div class="subtitle">Nivo Payment Events - Conexión con autenticación JWT</div>

    <div class="config-section">
        <label for="jwt">🔑 JWT Token (Bearer)</label>
        <textarea id="jwt" placeholder="Pega aquí tu token JWT...">eyJ0eXAiOiJKV1QiLCJraWQiOiJuZW9wYXJraW5nLWtleS0yMDI1LTAxIiwiYWxnIjoiUlMyNTYifQ.eyJpc3MiOiJodHRwOi8vbG9jYWxob3N0OjgwODAvYXBpIiwiZXhwIjoxNzc1MDgyNTIwLCJuYmYiOjE3NzI0OTA1MjAsImlhdCI6MTc3MjQ5MDUyMCwic3ViIjoiYmQxYjk1YmYtNjU4NC00NDIxLWFiZTUtYzA2NzMzZTVlNzIyIiwicm9sZSI6IlJPTEVfT1dORVIiLCJwdXJwb3NlIjoiYWNjZXNzLXRva2VuIiwidGVuYW50SWQiOiI0YTRjNjNlMy05YzVkLTRmMjMtOWE5NC01Nzc3MTAzMDdkYzciLCJmdWxsTmFtZSI6IkFuZ2VsIENvcnpvIiwianRpIjoiNzhhMDk1NTItZGMwOC00MTQ0LTk2OTMtMWU5NTQ4ZDZmYTAwIiwiZW1haWwiOiJhbmdlbEBuZW9wYXJraW5nLmNvbSJ9.HdnGRv4WBEq2bkSGPGOXTEBgHJH9pjUt20ukt8nLhUHTr5MCUq7uP4FK2TXW-qzT_6c15fBLKPnu7qitP1pfNw03LnNGuvWopdK1kS2giAX4oWu_prTD_QjnmR_l45YDIDfVA_uAwPssTVjmfUTFuW3kOYITW6Jbs8QEBVLZK5xraij5J17n_GI1blxiclUMQNlPyEAd4zUyhA8IKIfVyWxC_LprqmOaUbXi_EsRyLfc7jzcmfX4vvNI7WpfC8x1S8OjqQtWPyeFL7GTt2hbW-mMIpguBQD1V4hpL6kpsuljs6h_feyh7SzpiYheYFZCDibqo8kBoJkJe7X0rqzAFw</textarea>
    </div>

    <div class="config-section">
        <label for="paymentId">💳 Payment ID (para suscripción)</label>
        <input id="paymentId" type="text" value="20b6bb66-5171-4c22-b026-b49bfe54a7fe"/>
    </div>

    <div class="config-section">
        <label for="endpoint">🌐 WebSocket Endpoint</label>
        <input id="endpoint" type="text" value="ws://localhost:8080/api/payments"/>
    </div>

    <div class="status disconnected" id="status">
        ⚫ Desconectado
    </div>

    <div>
        <button id="connectBtn" onclick="connect()">🔗 Conectar</button>
        <button class="danger" disabled id="disconnectBtn" onclick="disconnect()">🔌 Desconectar</button>
        <button class="success" onclick="clearLog()">🗑️ Limpiar Log</button>
    </div>

    <div class="log-container">
        <label>📋 Log de Eventos</label>
        <div id="log"></div>
    </div>
</div>

<script>
    let ws = null;
    let reconnectAttempts = 0;
    const MAX_RECONNECT_ATTEMPTS = 5;
    const RECONNECT_DELAY = 3000;

    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const timestamp = new Date().toLocaleTimeString();
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.innerHTML = `<span class="timestamp">[${timestamp}]</span> ${message}`;
      logDiv.appendChild(entry);
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function updateStatus(text, className) {
      const statusDiv = document.getElementById('status');
      statusDiv.textContent = text;
      statusDiv.className = `status ${className}`;
    }

    function connect() {
      const jwt = document.getElementById('jwt').value.trim();
      const paymentId = document.getElementById('paymentId').value.trim();
      let endpoint = document.getElementById('endpoint').value.trim();

      if (!jwt) {
        log('⚠️ Error: Debes proporcionar un token JWT', 'error');
        return;
      }

      if (!paymentId) {
        log('⚠️ Error: Debes proporcionar un Payment ID', 'error');
        return;
      }

      // Convertir http:// a ws:// si es necesario
      endpoint = endpoint.replace(/^http:\/\//, 'ws://').replace(/^https:\/\//, 'wss://');

      log('🔄 Iniciando conexión WebSocket...', 'info');
      updateStatus('🔄 Conectando...', 'error');

      try {
        // Crear conexión WebSocket sin parámetros en URL
        ws = new WebSocket(endpoint);

        ws.onopen = (event) => {
          log('✅ Conectado exitosamente al servidor WebSocket', 'success');
          updateStatus('✅ Conectado', 'connected');
          document.getElementById('connectBtn').disabled = true;
          document.getElementById('disconnectBtn').disabled = false;
          reconnectAttempts = 0;

          // Enviar autorización en el primer mensaje
          const authMsg = {
            type: 'auth',
            token: jwt
          };
          ws.send(JSON.stringify(authMsg));
          log('🔐 Mensaje de autenticación enviado', 'info');

          // Esperar confirmación antes de suscribirse
          // En la práctica, el servidor debe responder a auth primero
        };

        ws.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);

            // Si el servidor confirma autenticación, enviar suscripción
            if (data.type === 'auth_success' || data.authenticated) {
              log('✅ Autenticación confirmada', 'success');
              const subscribeMsg = {
                type: 'subscribe',
                paymentId: paymentId
              };
              ws.send(JSON.stringify(subscribeMsg));
              log(`📡 Suscripción enviada para: ${paymentId}`, 'info');
              log('✅ Esperando eventos...', 'success');
            } else {
              log(`📨 Evento recibido: ${JSON.stringify(data, null, 2)}`, 'success');
            }
          } catch (e) {
            log(`📨 Mensaje recibido: ${event.data}`, 'warning');
          }
        };

        ws.onerror = (error) => {
          log(`❌ Error WebSocket: ${error.message || 'Error desconocido'}`, 'error');
          updateStatus('❌ Error de conexión', 'error');
        };

        ws.onclose = (event) => {
          log(`🔌 Conexión cerrada (código: ${event.code})`, 'warning');
          updateStatus('⚫ Desconectado', 'disconnected');
          document.getElementById('connectBtn').disabled = false;
          document.getElementById('disconnectBtn').disabled = true;

          // Reintentar conexión automáticamente
          if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS && !event.wasClean) {
            reconnectAttempts++;
            log(`🔄 Reintentando conexión (${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS}) en ${RECONNECT_DELAY}ms...`, 'warning');
            setTimeout(() => connect(), RECONNECT_DELAY);
          }
        };
      } catch (error) {
        log(`❌ Error al crear WebSocket: ${error.message}`, 'error');
        updateStatus('❌ Error de conexión', 'error');
        document.getElementById('connectBtn').disabled = false;
        document.getElementById('disconnectBtn').disabled = true;
      }
    }

    function disconnect() {
      if (ws && ws.readyState === WebSocket.OPEN) {
        log('🔌 Desconectando...', 'warning');
        reconnectAttempts = MAX_RECONNECT_ATTEMPTS; // Prevenir reconexión
        ws.close(1000, 'Desconexión manual');
      }
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
      log('🗑️ Log limpiado', 'info');
    }

    // Log inicial
    log('🚀 Cliente WebSocket nativo inicializado. Listo para conectar.', 'info');
</script>
</body>
</html>
