server:
  port: 8080
  servlet:
    context-path: /api
spring:
  profiles:
    active: dev
  application:
    name: "Nivo"
  devtools:
    add-properties: false
  datasource:
    driverClassName: org.postgresql.Driver
  flyway:
    enabled: false
  jpa:
    databasePlatform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        physical_naming_strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
        globally_quoted_identifiers: true
        default_schema: nivo
  security:
    oauth2:
      resourceserver:
        jwt:
          public-key-location: classpath:keys/public_key.pem
          issuer-uri: "${jwt.issue}"
  threads:
    virtual:
      enabled: true
  task:
    execution:
      thread-name-prefix: virtual-async-
management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
cors:
  allowed-origins: "http://localhost:4200,http://localhost:8080,http://localhost:63342"

springdoc:
  default-consumes-media-type: application/json
  default-produces-media-type: application/json
